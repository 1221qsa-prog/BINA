    <main>

        <div id="login-box" style="text-align: center; margin: 50px;">
            <h2> 🔒시스템 인증이 필요합니다</h2>
            <input type="text" id="userId" placeholder="사용자 이름"></br>
            <input type="password" id="userPw" placeholder="암호 4자리">
            <button onclick="checkLogin()">입장하기</button>

        </div>
        
        
        <div id="secret-area" style="display: none;">
            <h3 style="color: #2e7d32;">👏<span id="user-display"></span>님,반갑습니다!</h3>

        



            

            


        <div class="display-box">
            <img id="targetimg" src="./images/ddada.jpg" style="width: 100%;
            max-width: 500px;"/>
            <p id="targetDesc">과일&채소요리</p>
        </div>

        <div class="thumb-list">
            <img src="images/ddada.jpg" alt="실습1" onclick="show('./images/ddada.jpg','과일모둠!')">
            <img src="images/zzsc.jpg" alt="실습2" onclick="show('./images/zzsc.jpg','수박')">
            <img src="images/zxc.jpg" alt="실습3" onclick="show('./images/zxc.jpg','달걀토마토볶음')">
             <img src="images/qwe.jpg" alt="실습4" onclick="show('./images/qwe.jpg','방울 토마토 마리네이드')">
             <img src="images/lkj.jpg" alt="실습5" onclick="show('./images/lkj.jpg','방울 토마토 구이')">
             <img src="images/gg.webp" alt="실습6" onclick="show('./images/gg.webp','방울 토마토 올리브 절임')">
             <img src="images/zz.jpg" alt="실습7" onclick="show('./images/zz.jpg','과일 요거트')">
             <img src="images/qqq.jpg"  alt="실습8"onclick="show('./images/qqq.jpg','과일 샐러드')">
             <img src="images/kkk.jpg" alt="실습9" onclick="show('./images/kkk.jpg','과일 화채')">
             <img src="images/hhhh.png" alt="실습10" onclick="show('./images/hhhh.png','과일 꼬치')">
        </div>






         


            <hr>
            <div id="settings" style="margin-top: 30px ; padding: 20px; border: 1px solid #ddd; background:#fff ;">
                <h4> 🔑 시스템 보안 설정 </h4>
                <p style="font-size: 0.9em; color: #666;">보안을 위해 정기적으로 비밀번호를 변경해주세요.</p>
                <input type="password" id="newPw" placeholder="새 비밀번호 입력" />
                <button onclick="changePassword()">비밀번호 변경</button>
                <button onclick="logout()">로그아웃</button>
            </div>
      
    </main>

    <script>
        function show(imgPath, text){
            document.getElementById("targetimg").src=imgPath;
            document.getElementById("targetDesc").innerText=text;
        }







        function checkLogin(){
        let name = document.getElementById("userId").value;
        let pw = document.getElementById("userPw").value;

        let currentPw = localStorage.getItem("userPassword") || "1234" ;

        if (pw === currentPw && name !== "" ) {
            localStorage.setItem("isLoggedIn","true")
            localStorage.setItem("savedName",name);
            localStorage.setItem("userPassword",currentPw);

            alert(name + "님, 인증 정보가 저장소에 기록되었습니다.");

            document.getElementById("login-box").style.display="none";
            document.getElementById("secret-area").style.display="block";
            document.getElementById("user-display").innerText= name ;

        } else {
            alert("암호가 일치하지 않습니다. 다시 시도하십시오");
        }
      }
      window.onload = function() {
        let isLoggedIn = localStorage.getItem("isLoggedIn");

        let savedName = localStorage.getItem("savedName");

        if (isLoggedIn === "true") {
            document.getElementById("login-box").style.display = "none";
            document.getElementById("secret-area").style.display = "block";
            document.getElementById("user-display").innerText = savedName;
        }
      };
      function changePassword() {
        let newPw = document.getElementById("newPw").value;
        if (newPw.length < 4) { 
            alert("암호는 4자리 이상이어야 합니다.");
         return;
         }


        localStorage.setItem("userPassword", newPw) ;
        
        alert("비밀번호가 변경되었습니다.");

        document.getElementById("newPw").value = "";
      }
      function logout() {
        if (confirm("로그아웃 하시겠습니까?")) {
            localStorage.removeItem("isLoggedIn");
            localStorage.removeItem("savedName");
            location.href = "index.html";

        }
      }







        
    </script>
